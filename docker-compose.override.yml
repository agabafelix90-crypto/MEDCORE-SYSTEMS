version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
      target: development
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    volumes:
      - ./backend:/usr/src/app:delegated
      - /usr/src/app/node_modules
    ports:
      - "3000:3000"
    command: ["npm","run","dev:backend"]
    depends_on:
      - redis
    networks:
      - medcore-net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: development
    env_file:
      - .env
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_HOST=0.0.0.0
      - VITE_PORT=5173
    volumes:
      - ./:/app:delegated
      - /app/node_modules
    ports:
      - "5173:5173"
    command: ["npm","run","dev"]
    networks:
      - medcore-net

  nginx:
    profiles: ['with-nginx']
    image: nginx:stable-alpine
    ports:
      - '80:80'
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - medcore-net

volumes:
  redis-data:
  frontend-dist:

networks:
  medcore-net:
    driver: bridge
