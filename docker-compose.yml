version: '3.9'

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server","--appendonly","yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    ports:
      - "6379:6379"
    networks:
      - medcore-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
      target: production
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL","curl -f http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - medcore-net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: production
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    ports:
      - "5173:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL","curl -f http://localhost/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - medcore-net

  nginx:
    image: nginx:stable-alpine
    profiles:
      - with-nginx
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - medcore-net

volumes:
  redis-data:
    driver: local
  frontend-dist:
    driver: local

networks:
  medcore-net:
    driver: bridge
